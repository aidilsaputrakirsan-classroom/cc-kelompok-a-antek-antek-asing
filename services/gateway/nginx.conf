# ==============================================
# API Gateway — Nginx Reverse Proxy
# Antick Async Microservices
# ==============================================
# Routing:
#   /auth/*  → auth-service:8001  (strip /auth prefix)
#   /items   → item-service:8002
#   /items/* → item-service:8002
#   /health  → inline JSON response (gateway health)
#   /        → frontend:3000 (React SPA)

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
limit_req_status 429;

upstream auth_service {
    server auth-service:8001;
}

upstream item_service {
    server item-service:8002;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    error_page 429 = @429;
    location @429 {
        default_type application/json;
        return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded. Please slow down."}';
    }

    # ==================== AUTH SERVICE ====================
    # Strip /auth prefix before forwarding.
    # POST /auth/register → http://auth-service:8001/register
    # POST /auth/login    → http://auth-service:8001/login
    # GET  /auth/verify   → http://auth-service:8001/verify

    location /auth/metrics {
        limit_req zone=general_limit burst=10 nodelay;
        proxy_pass http://auth_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }

    # ==================== AUTH SERVICE EXTENDED (Monolith endpoints) ====================
    # Route old monolithic endpoints to auth_service WITHOUT stripping the prefix
    location ~ ^/(tickets|categories|notifications|users|dashboard|admin) {
        limit_req zone=general_limit burst=20 nodelay;
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }

    # ==================== ITEM SERVICE ====================
    # GET/POST /items      → http://item-service:8002/items
    # GET/PUT/DELETE /items/{id} → http://item-service:8002/items/{id}

    location /items/metrics {
        proxy_pass http://item_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /items {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://item_service/items;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }

    # ==================== GATEWAY HEALTH ====================
    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway"}';
    }

    # ==================== FRONTEND (React SPA) ====================
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
