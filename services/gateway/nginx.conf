# ==============================================
# API Gateway — Nginx Reverse Proxy
# Antick Async Microservices
# ==============================================
# Routing:
#   /auth/*  → auth-service:8001  (strip /auth prefix)
#   /items   → item-service:8002
#   /items/* → item-service:8002
#   /health  → inline JSON response (gateway health)
#   /        → frontend:3000 (React SPA)

map $http_origin $cors_origin {
    default "";
    "~^https?://(www\.)?antick-async\.online$" $http_origin;
    "~^https?://api\.antick-async\.online$" $http_origin;
    "~^http://localhost(:[0-9]+)?$" $http_origin;
}

upstream auth_service {
    server auth-service:8001;
}

upstream item_service {
    server item-service:8002;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    listen 8000;
    server_name localhost;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Max-Age;

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Max-Age 600 always;
    add_header Vary Origin always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ==================== AUTH SERVICE ====================
    # Strip /auth prefix before forwarding.
    # POST /auth/register → http://auth-service:8001/register
    # POST /auth/login    → http://auth-service:8001/login
    # GET  /auth/verify   → http://auth-service:8001/verify

    location /auth/metrics {
        proxy_pass http://auth_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }

    # ==================== AUTH SERVICE EXTENDED (Monolith endpoints) ====================
    # Route old monolithic endpoints to auth_service WITHOUT stripping the prefix
    location ~ ^/(tickets|categories|notifications|users|dashboard|admin) {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }

    # ==================== ITEM SERVICE ====================
    # GET/POST /items      → http://item-service:8002/items
    # GET/PUT/DELETE /items/{id} → http://item-service:8002/items/{id}

    location /items/metrics {
        proxy_pass http://item_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /items {
        proxy_pass http://item_service/items;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }

    # ==================== GATEWAY HEALTH ====================
    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway"}';
    }

    # ==================== FRONTEND (React SPA) ====================
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
