# ==============================================
# Docker Compose — Microservices Architecture
# Antick Async (Cloud Kelompok A)
# ==============================================
# Services:
#   1. auth-db      : PostgreSQL untuk Auth Service
#   2. item-db      : PostgreSQL untuk Item Service
#   3. auth-service : FastAPI Authentication (port 8001, internal)
#   4. item-service : FastAPI Items CRUD   (port 8002, internal)
#   5. frontend     : React + Nginx        (port 3000, internal)
#   6. gateway      : Nginx API Gateway    (port 80,   exposed)
#   7. cloudflared  : Cloudflare Tunnel
#
# Health check chain:
#   auth-db (healthy) → auth-service (healthy) ─┐
#   item-db (healthy) → item-service (healthy) ─┤→ gateway (starts)
#
# ⚠️  Catatan Cloudflare Tunnel:
#   Setelah update ini, ingress di Cloudflare dashboard perlu diubah:
#   api.antick-async.online → http://gateway:80  (bukan http://backend:8000)

services:
  # ================================
  # DATABASES (Database per Service)
  # ================================
  auth-db:
    image: postgres:16-alpine
    container_name: antick-async-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  item-db:
    image: postgres:16-alpine
    container_name: antick-async-item-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: item_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - item_db_data:/var/lib/postgresql/data
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d item_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ================================
  # BACKEND MICROSERVICES
  # ================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: antick-async-auth-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres123@auth-db:5432/auth_db
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      SERVICE_NAME: auth-service
      LOG_LEVEL: INFO
    networks:
      - cloudnet
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  item-service:
    build:
      context: ./services/item-service
      dockerfile: Dockerfile
    container_name: antick-async-item-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres123@item-db:5432/item_db
      AUTH_SERVICE_URL: http://auth-service:8001
      SERVICE_NAME: item-service
      LOG_LEVEL: INFO
    networks:
      - cloudnet
    depends_on:
      item-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ================================
  # FRONTEND
  # ================================
  frontend:
    image: notyourkisee/antick-async-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost         # via gateway (port 80)
        VITE_SPLINE_SCENE_URL: https://prod.spline.design/JtAnJNdegVMirBAb/scene.splinecode
        VITE_SPLINE_SCENE_URL_REGISTER: https://prod.spline.design/D4gusWP1Rw4kgtey/scene.splinecode
    container_name: antick-async-frontend
    restart: unless-stopped
    networks:
      - cloudnet

  # ================================
  # API GATEWAY
  # ================================
  gateway:
    image: nginx:1.25-alpine
    container_name: antick-async-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      cloudnet:
        aliases:
          - backend
    depends_on:
      auth-service:
        condition: service_healthy
      item-service:
        condition: service_healthy
      frontend:
        condition: service_started

  # ================================
  # CLOUDFLARE TUNNEL
  # ================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: antick-async-tunnel
    restart: unless-stopped
    env_file:
      - .env
    command: tunnel --no-autoupdate run
    networks:
      - cloudnet
    depends_on:
      - gateway

# ==================== VOLUMES ====================
volumes:
  auth_db_data:
    name: antick-async-auth-db-data
  item_db_data:
    name: antick-async-item-db-data

# ==================== NETWORKS ====================
networks:
  cloudnet:
    name: cloudapp-network
    driver: bridge
