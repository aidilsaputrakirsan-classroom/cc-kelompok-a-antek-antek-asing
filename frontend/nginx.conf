server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # 1. Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/xml+rss application/atom+xml application/xhtml+xml image/svg+xml;

    # 2. Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3. Cache Policy
    location = /index.html {
        expires -1;
    }

    # Cache avatar images for development (short cache)
    location ~* ^/avatars/.*\.(png|jpg|jpeg|gif|webp)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Cache other static assets long-term
    location ~* \.(js|css|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
    }

    # 4. Custom Error Handling
    # SPA routes use index.html while server errors use dedicated error page.
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
        expires -1;
    }
}