# ==============================================
# CI Pipeline — Cloud Kelompok A (Antick Async)
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
#
# Jobs:
# 1. test-backend  : Install deps + run pytest (SQLite in-memory)
# 2. test-frontend : Install deps + run Vitest + build Vite
# 3. build-docker  : Build Docker images (hanya jika kedua test PASS)
#
# Optimasi:
# - concurrency: cancel run lama jika ada push baru ke branch yang sama
# - timeout-minutes: 10 per job (auto-fail jika melebihi batas)
# - PR comment notification saat CI gagal

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel run yang sedang berjalan jika ada push baru ke branch yang sama
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # JOB 1: Test Backend (Python/FastAPI)
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./backend

    env:
      # Env vars wajib untuk config.py agar tidak throw ValueError saat import
      DATABASE_URL: "sqlite:///./test.db"
      SECRET_KEY: "ci-testing-secret-key-minimum-32-characters-for-jwt-signing"
      SUPERADMIN_EMAIL: "superadmin@admin.com"
      SUPERADMIN_PASSWORD: "KatasandiKuatBaru123!"
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USER: "ci@example.com"
      SMTP_PASSWORD: "dummy-smtp-password"
      MAIL_FROM: "ci@example.com"
      MAIL_FROM_NAME: "CI Test"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run tests with coverage
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=50



  # ================================
  # JOB 2: Test Frontend (React/Vitest)
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./frontend

    env:
      VITE_API_URL: "http://localhost:8000"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build frontend
        run: npm run build



  # ================================
  # JOB 3: Build Docker Images
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]    # Hanya jalan jika KEDUA test PASS
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 🏗️ Pre-build React for Docker
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: 🐳 Build images using Docker Compose
        run: docker compose build

      - name: ✅ Build success
        run: |
          echo "✅ All Docker images built successfully!"
          docker images
